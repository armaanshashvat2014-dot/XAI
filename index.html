<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartBot</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
background:#060c18;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#1e2230;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.chat-list{
flex:1;
overflow:auto;
}

.chat-item{
padding:8px;
cursor:pointer;
border-radius:6px;
}

.chat-item:hover{
background:#3a4055;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
text-align:center;
padding:20px;
font-size:32px;
color:#4bd6ff;
}

.chat{
flex:1;
overflow:auto;
padding:20px;
max-width:900px;
margin:auto;
}

.message{
padding:12px;
border-radius:8px;
margin-bottom:10px;
max-width:70%;
}

.user{
background:#4bd6ff;
color:black;
margin-left:auto;
}

.bot{
background:#22273a;
}

.input-area{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid #333;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e2230;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#4bd6ff;
cursor:pointer;
}

.diagram{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="sidebar">

<button onclick="newChat()">+ New Chat</button>

<div class="chat-list" id="chatList"></div>

</div>

<div class="main">

<div class="header">SmartBot</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Ask SmartBot...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

/* STORAGE */

let chats = JSON.parse(localStorage.getItem("smartbotChats")) || {}
let currentChat = null

function save(){
localStorage.setItem("smartbotChats",JSON.stringify(chats))
}

/* CHAT LIST */

function renderChats(){

const list=document.getElementById("chatList")
list.innerHTML=""

Object.keys(chats).forEach(id=>{

const div=document.createElement("div")
div.className="chat-item"
div.innerText=chats[id].title
div.onclick=()=>loadChat(id)

list.appendChild(div)

})

}

/* CHAT FUNCTIONS */

function newChat(){

const id="chat"+Date.now()

chats[id]={
title:"New Chat",
messages:[]
}

currentChat=id

save()
renderChats()
renderMessages()

}

function loadChat(id){
currentChat=id
renderMessages()
}

function renderMessages(){

const chat=document.getElementById("chat")
chat.innerHTML=""

if(!currentChat) return

chats[currentChat].messages.forEach(m=>{

const div=document.createElement("div")
div.className="message "+m.role

if(m.diagram)
div.innerHTML=m.text+m.diagram
else
div.innerText=m.text

chat.appendChild(div)

})

chat.scrollTop=chat.scrollHeight

}

function addMessage(role,text,diagram=null){

chats[currentChat].messages.push({
role,
text,
diagram
})

if(chats[currentChat].title==="New Chat")
chats[currentChat].title=text.slice(0,25)

save()
renderChats()
renderMessages()

}

/* MATH SOLVER */

function solveMath(q){

try{

const result = math.evaluate(q)

return "🧮 Result: " + result

}catch{
return null
}

}

/* WIKIPEDIA */

async function wiki(q){

try{

const url="https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(q)

const res=await fetch(url)

if(res.ok){

const data=await res.json()

if(data.extract)
return data.extract

}

}catch{}

return null

}

/* DIAGRAM GENERATOR */

function generateDiagram(q){

q=q.toLowerCase()

if(q.includes("triangle")){

return `
<div class="diagram">
<svg width="250" height="200">
<polygon points="50,150 200,150 125,40"
style="fill:lightblue;stroke:black"/>
</svg>
</div>
`

}

if(q.includes("circle")){

return `
<div class="diagram">
<svg width="250" height="200">
<circle cx="120" cy="100" r="80"
stroke="black" fill="lightgreen"/>
</svg>
</div>
`

}

if(q.includes("cell")){

return `
<div class="diagram">
<svg width="250" height="200">
<circle cx="120" cy="100" r="80" fill="lightgreen"/>
<circle cx="120" cy="100" r="30" fill="purple"/>
<text x="95" y="105" fill="white">Nucleus</text>
</svg>
</div>
`

}

return null

}

/* SMART RESPONSE */

async function smartReply(q){

const math=solveMath(q)
if(math) return {text:math}

const diagram=generateDiagram(q)
if(diagram) return {text:"Generated diagram:",diagram}

const wikiAnswer=await wiki(q)
if(wikiAnswer) return {text:wikiAnswer}

return {text:"I couldn't find a clear answer."}

}

/* SEND */

async function send(){

const input=document.getElementById("input")
const text=input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

const reply=await smartReply(text)

addMessage("bot",reply.text,reply.diagram)

}

/* ENTER KEY */

document.getElementById("input").addEventListener("keypress",function(e){

if(e.key==="Enter") send()

})

/* INIT */

renderChats()

if(Object.keys(chats).length===0)
newChat()
else
loadChat(Object.keys(chats)[0])

</script>

</body>
</html>
