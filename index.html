<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>📚Smartbit AI</title>

<style>

*{
box-sizing:border-box;
font-family:Inter,Arial;
}

body{
margin:0;
background:#060c18;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#1e2230;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.welcome{
background:#2f5e4d;
padding:12px;
border-radius:8px;
color:#7dffb0;
}

.sidebar button{
padding:12px;
border:none;
border-radius:8px;
background:#2a2f40;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#3a4055;
}

.chat-list{
flex:1;
overflow:auto;
margin-top:10px;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
margin-bottom:5px;
}

.chat-item:hover{
background:#3a4055;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
text-align:center;
padding:40px;
}

.logo{
font-size:40px;
color:#4bd6ff;
font-weight:bold;
}

.subtitle{
opacity:0.7;
}

/* CHAT AREA */

.chat{
flex:1;
overflow:auto;
padding:20px;
max-width:800px;
margin:auto;
}

.message{
padding:12px;
border-radius:8px;
margin-bottom:10px;
max-width:70%;
}

.user{
background:#4bd6ff;
color:black;
margin-left:auto;
}

.bot{
background:#22273a;
}

/* INPUT */

.input-area{
padding:15px;
display:flex;
gap:10px;
border-top:1px solid #333;
}

.input-area input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e2230;
color:white;
}

.input-area button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#4bd6ff;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="welcome">👋Welcome back!</div>

<button onclick="newChat()">+ New Chat</button>

<div class="chat-list" id="chatList"></div>

</div>

<div class="main">

<div class="header">
<div class="logo">SmartBot</div>
<div class="subtitle">Your Tutor for all grades!Just type what you want to know about.If waht is a country, type country, or maths, just type the problem, no = symbol.And done!</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Ask SmartBot...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

/* STORAGE */

let chats = JSON.parse(localStorage.getItem("helixChats")) || {}
let currentChat = null

function save(){
localStorage.setItem("SmartBotChats",JSON.stringify(chats))
}

/* SIDEBAR */

function renderChats(){

const list=document.getElementById("chatList")
list.innerHTML=""

Object.keys(chats).forEach(id=>{

const div=document.createElement("div")
div.className="chat-item"
div.innerText=chats[id].title

div.onclick=()=>loadChat(id)

list.appendChild(div)

})

}

/* NEW CHAT */

function newChat(){

const id="chat"+Date.now()

chats[id]={
title:"New Chat",
messages:[]
}

currentChat=id

save()
renderChats()
renderMessages()

}

/* LOAD CHAT */

function loadChat(id){
currentChat=id
renderMessages()
}

/* RENDER MESSAGES */

function renderMessages(){

const chat=document.getElementById("chat")
chat.innerHTML=""

if(!currentChat) return

chats[currentChat].messages.forEach(m=>{

const div=document.createElement("div")
div.className="message "+m.role
div.innerText=m.text

chat.appendChild(div)

})

chat.scrollTop=chat.scrollHeight

}

/* ADD MESSAGE */

function addMessage(role,text){

chats[currentChat].messages.push({
role,
text
})

if(chats[currentChat].title==="New Chat")
chats[currentChat].title=text.slice(0,20)

save()
renderChats()
renderMessages()

}

/* SIMPLE RESPONSE LOGIC */

function generateReply(q){

if(q.toLowerCase().includes("math"))
return "I can help with math! Ask a problem."

if(q.toLowerCase().includes("science"))
return "Science question detected. Tell me more."

return "I'm SmartBot! Ask me anything about your studies."

}

/* SEND */

function send(){

const input=document.getElementById("input")
const text=input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

setTimeout(()=>{

const reply=generateReply(text)

addMessage("bot",reply)

},500)

}

/* ENTER KEY */

document.getElementById("input").addEventListener("keypress",function(e){

if(e.key==="Enter") send()

})

/* INIT */

renderChats()

if(Object.keys(chats).length===0)
newChat()
else
loadChat(Object.keys(chats)[0])

</script>

</body>
</html>
