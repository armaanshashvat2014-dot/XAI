<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartBot AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#00d4ff;
}

.chat{
height:75vh;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:10px;
border-radius:8px;
max-width:600px;
}

.user{
background:#00d4ff;
color:black;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.input-area{
display:flex;
padding:10px;
border-top:1px solid #333;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
margin-left:5px;
border:none;
background:#00d4ff;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">💬 SmartBot</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="question" placeholder="Ask something...">
<button onclick="ask()">Send</button>
</div>

<script>

const chat = document.getElementById("chat")

function addMessage(role,text){

const div=document.createElement("div")
div.className="message "+role
div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

/* math solver */

function solveMath(q){

try{
const result = eval(q)
if(!isNaN(result)) return "🧮 Math Result: "+result
}catch{}

return null

}

/* wikipedia search */

async function wikiSearch(q){

try{

const url="https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(q)

const res=await fetch(url)

if(res.ok){
const data=await res.json()
if(data.extract) return data.extract
}

}catch{}

return null

}

/* web search */

async function webSearch(q){

try{

const url="https://api.duckduckgo.com/?q="+encodeURIComponent(q)+"&format=json"

const res=await fetch(url)
const data=await res.json()

if(data.Abstract) return data.Abstract

}catch{}

return null

}

/* main logic */

async function ask(){

const input=document.getElementById("question")
const q=input.value.trim()

if(!q) return

addMessage("user",q)

input.value=""

addMessage("bot","Thinking...")

/* math */

let answer = solveMath(q)

/* wiki */

if(!answer)
answer = await wikiSearch(q)

/* web */

if(!answer)
answer = await webSearch(q)

if(!answer)
answer = "Sorry, I couldn't find an answer."

chat.lastChild.remove()

addMessage("bot",answer)

}

/* enter key */

document.getElementById("question").addEventListener("keypress",function(e){

if(e.key==="Enter") ask()

})

</script>

</body>
</html>
