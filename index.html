<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SmartBot AI</title>

<style>

*{box-sizing:border-box;font-family:Arial}

body{
margin:0;
background:#060c18;
color:white;
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:260px;
background:#1e2230;
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.sidebar button{
padding:12px;
border:none;
border-radius:8px;
background:#2a2f40;
color:white;
cursor:pointer;
}

.chat-list{
flex:1;
overflow:auto;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
}

.chat-item:hover{
background:#3a4055;
}

/* Main */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
text-align:center;
padding:30px;
}

.logo{
font-size:40px;
color:#4bd6ff;
font-weight:bold;
}

.chat{
flex:1;
overflow:auto;
padding:20px;
max-width:800px;
margin:auto;
}

.message{
padding:12px;
border-radius:8px;
margin-bottom:10px;
max-width:70%;
}

.user{
background:#4bd6ff;
color:black;
margin-left:auto;
}

.bot{
background:#22273a;
}

.input-area{
padding:15px;
display:flex;
gap:10px;
border-top:1px solid #333;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e2230;
color:white;
}

button.send{
background:#4bd6ff;
color:black;
}

.diagram{
margin-top:10px;
background:white;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="sidebar">

<button onclick="newChat()">+ New Chat</button>

<div class="chat-list" id="chatList"></div>

</div>

<div class="main">

<div class="header">
<div class="logo">SmartBot, AI tutor.Just type what you want to know about.If what is a country, type country, or in maths, just type the problem, no = symbol.Done!</div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Ask SmartBot...">
<button class="send" onclick="send()">Send</button>
</div>

</div>

<script>

/* STORAGE */

let chats = JSON.parse(localStorage.getItem("smartbotChats")) || {}
let currentChat = null

function save(){
localStorage.setItem("smartbotChats",JSON.stringify(chats))
}

/* CHAT LIST */

function renderChats(){

const list=document.getElementById("chatList")
list.innerHTML=""

Object.keys(chats).forEach(id=>{

const div=document.createElement("div")
div.className="chat-item"
div.innerText=chats[id].title

div.onclick=()=>loadChat(id)

list.appendChild(div)

})

}

/* NEW CHAT */

function newChat(){

const id="chat"+Date.now()

chats[id]={
title:"New Chat",
messages:[]
}

currentChat=id

save()
renderChats()
renderMessages()

}

/* LOAD CHAT */

function loadChat(id){
currentChat=id
renderMessages()
}

/* RENDER */

function renderMessages(){

const chat=document.getElementById("chat")
chat.innerHTML=""

if(!currentChat) return

chats[currentChat].messages.forEach(m=>{

const div=document.createElement("div")
div.className="message "+m.role

if(m.diagram){

div.innerHTML=m.text+m.diagram

}else{

div.innerText=m.text

}

chat.appendChild(div)

})

chat.scrollTop=chat.scrollHeight

}

/* ADD MESSAGE */

function addMessage(role,text,diagram=null){

chats[currentChat].messages.push({
role,
text,
diagram
})

if(chats[currentChat].title==="New Chat")
chats[currentChat].title=text.slice(0,25)

save()
renderChats()
renderMessages()

}

/* MATH SOLVER */

function solveMath(q){

try{
const result=eval(q)
if(!isNaN(result))
return "🧮 Answer: "+result
}catch{}

return null

}

/* DIAGRAM GENERATOR */

function generateDiagram(q){

q=q.toLowerCase()

if(q.includes("cell")){

return `
<div class="diagram">
<svg width="250" height="200">
<circle cx="120" cy="100" r="80" stroke="black" fill="lightgreen"/>
<circle cx="120" cy="100" r="30" fill="purple"/>
<text x="90" y="105" fill="white">Nucleus</text>
</svg>
</div>
`

}

if(q.includes("triangle")){

return `
<div class="diagram">
<svg width="250" height="200">
<polygon points="50,150 200,150 125,40"
style="fill:lightblue;stroke:black"/>
</svg>
</div>
`

}

if(q.includes("solar system")){

return `
<div class="diagram">
<svg width="300" height="200">
<circle cx="150" cy="100" r="20" fill="orange"/>
<circle cx="150" cy="100" r="60" fill="none" stroke="white"/>
<circle cx="210" cy="100" r="6" fill="blue"/>
</svg>
</div>
`

}

return null

}

/* WIKIPEDIA SEARCH */

async function wiki(q){

try{

const url="https://en.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(q)

const res=await fetch(url)

if(res.ok){

const data=await res.json()

if(data.extract)
return data.extract

}

}catch{}

return null

}

/* SMART RESPONSE */

async function smartReply(q){

const math=solveMath(q)
if(math) return {text:math}

const diagram=generateDiagram(q)
if(diagram)
return {text:"Here is a diagram:",diagram}

const wikiAnswer=await wiki(q)
if(wikiAnswer)
return {text:wikiAnswer}

return {text:"I couldn't find a clear answer, but try asking in another way."}

}

/* SEND */

async function send(){

const input=document.getElementById("input")
const text=input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

const reply=await smartReply(text)

addMessage("bot",reply.text,reply.diagram)

}

/* ENTER KEY */

document.getElementById("input").addEventListener("keypress",function(e){

if(e.key==="Enter") send()

})

/* INIT */

renderChats()

if(Object.keys(chats).length===0)
newChat()
else
loadChat(Object.keys(chats)[0])

</script>

</body>
</html>
